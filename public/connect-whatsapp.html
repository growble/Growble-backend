<!DOCTYPE html>
<html>
<head>

<title>Connect WhatsApp</title>

<style>

body{
background:#0b1220;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{

width:420px;

padding:30px;

background:#1a1f35;

border-radius:18px;

}

input{

width:100%;

padding:12px;

margin:10px 0;

border:none;

border-radius:10px;

}

button{

width:100%;

padding:12px;

background:#00d4ff;

border:none;

font-weight:bold;

border-radius:10px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

<h2>Connect WhatsApp</h2>

<input
id="phoneId"
placeholder="WhatsApp Phone ID"
/>

<input
id="token"
placeholder="Permanent Token"
/>

<input
id="verify"
placeholder="Verify Token"
/>

<button id="saveBtn">

Save

</button>

</div>

<script src="/connect-whatsapp.js"></script>

</body>

</html>
