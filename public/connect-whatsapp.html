<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Connect WhatsApp</title>

<style>

body{
background:#0b1220;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:white;
}

.card{

background:#151d31;

padding:40px;

border-radius:15px;

width:450px;

text-align:center;

}

button{

width:100%;

padding:15px;

background:#25D366;

color:white;

font-size:18px;

border:none;

border-radius:10px;

cursor:pointer;

}

button:hover{

opacity:.9;

}

</style>

</head>

<body>

<div class="card">

<h2>Connect Your WhatsApp Business</h2>

<p>

Connect your WhatsApp Business Account securely using Meta.

</p>

<br>

<button id="connectBtn">

Connect with Facebook

</button>

</div>

<script src="/connect-whatsapp.js"></script>
<div id="fb-root"></div>

<script>
window.fbAsyncInit = function () {
    FB.init({
        appId: "2353053915180115",
        cookie: true,
        xfbml: false,
        version: "v23.0"
    });

    console.log("Facebook SDK Loaded");
};

(function(d, s, id) {
    var js, fjs = d.getElementsByTagName(s)[0];
    if (d.getElementById(id)) return;

    js = d.createElement(s);
    js.id = id;
    js.src = "https://connect.facebook.net/en_US/sdk.js";

    fjs.parentNode.insertBefore(js, fjs);

}(document, 'script', 'facebook-jssdk'));
</script>

</body>

</html>
